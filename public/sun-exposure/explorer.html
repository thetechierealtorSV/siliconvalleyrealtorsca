<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sun & Property Explorer | SunPath IQ</title>
<meta name="description" content="Search any Silicon Valley address to see its sun path, Daylight Score, and 3D shadow simulation in true solar time. Powered by SunPath IQ from Nikolaenko Property Group." />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#0b1226; color:#e8edf7; }
  .spx-wrap { display:flex; flex-direction:column; height:100vh; }
  .spx-header { padding:14px 18px; background:#0f1830; border-bottom:1px solid #24304f; }
  .spx-header h1 { margin:0 0 4px; font-size:1.15rem; font-weight:600; letter-spacing:.2px; }
  .spx-header p { margin:0; font-size:.82rem; color:#9fb0d0; }
  .spx-searchbar { display:flex; gap:8px; padding:12px 18px; background:#0f1830; border-bottom:1px solid #24304f; flex-wrap:wrap; }
  .spx-searchbar input { flex:1; min-width:220px; padding:10px 12px; border-radius:8px; border:1px solid #2b3a5e; background:#0b1226; color:#e8edf7; font-size:.95rem; }
  .spx-searchbar button { padding:10px 18px; border-radius:8px; border:none; background:#f5a623; color:#1a1200; font-weight:600; cursor:pointer; font-size:.95rem; }
  .spx-searchbar button:hover { background:#ffb733; }
  .spx-hint { font-size:.75rem; color:#7f90b0; padding:0 18px 8px; background:#0f1830; }
  .spx-body { flex:1; display:flex; min-height:0; }
  #spx-map { width:42%; min-width:280px; height:100%; }
  #spx-sim { flex:1; height:100%; border:none; background:#0b1226; }
  @media (max-width: 820px){ .spx-body{ flex-direction:column; } #spx-map{ width:100%; height:38%; } #spx-sim{ height:62%; } }
  .spx-err { color:#ff9c9c; font-size:.8rem; padding:0 18px 8px; background:#0f1830; }
</style>
</head>
<body>
<div class="spx-wrap">
  <div class="spx-header">
    <h1>Sun &amp; Property Explorer</h1>
    <p>Search any address to see its sun path, Daylight Score, and 3D shadow simulation &mdash; in true solar time.</p>
  </div>
  <div class="spx-searchbar">
    <input id="spx-address" type="text" placeholder="Enter any address, e.g. 429 University Ave, Palo Alto, CA" autocomplete="off" />
    <button id="spx-go" type="button">Explore Sun &amp; Shadows</button>
  </div>
  <div class="spx-hint">Tip: click anywhere on the map to drop a pin and simulate that exact spot. Map data &copy; OpenStreetMap contributors.</div>
  <div id="spx-error" class="spx-err" style="display:none;"></div>
  <div class="spx-body">
    <div id="spx-map"></div>
    <iframe id="spx-sim" title="SunPath IQ 3D Sun and Shadow Simulator" allow="geolocation" src="index.html"></iframe>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function(){
  var DEFAULT = [37.4419, -122.1430]; // Palo Alto
  var map = L.map('spx-map', { zoomControl:true }).setView(DEFAULT, 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  var marker = L.marker(DEFAULT, { draggable:true }).addTo(map);
  var sim = document.getElementById('spx-sim');
  var addressInput = document.getElementById('spx-address');
  var errEl = document.getElementById('spx-error');

  function showErr(msg){ errEl.textContent = msg; errEl.style.display = msg ? 'block' : 'none'; }

  function loadSim(lat, lon, address){
    var q = '?lat=' + lat.toFixed(6) + '&lon=' + lon.toFixed(6);
    if (address) q += '&address=' + encodeURIComponent(address);
    sim.src = 'index.html' + q;
  }

  function setLocation(lat, lon, address, zoom){
    var ll = [lat, lon];
    marker.setLatLng(ll);
    map.setView(ll, zoom || 16);
    loadSim(lat, lon, address);
    showErr('');
  }

  async function geocode(query){
    showErr('Searching…');
    try {
      var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query);
      var res = await fetch(url, { headers: { 'Accept':'application/json' } });
      var data = await res.json();
      if (data && data.length) {
        var r = data[0];
        setLocation(parseFloat(r.lat), parseFloat(r.lon), r.display_name || query, 16);
      } else {
        showErr('No results found for that address. Try adding city and state.');
      }
    } catch (e) {
      showErr('Address lookup is temporarily unavailable. You can click the map to pick a location.');
    }
  }

  document.getElementById('spx-go').addEventListener('click', function(){
    var q = addressInput.value.trim();
    if (q) geocode(q);
  });
  addressInput.addEventListener('keydown', function(e){ if (e.key === 'Enter'){ e.preventDefault(); document.getElementById('spx-go').click(); } });

  map.on('click', function(e){ setLocation(e.latlng.lat, e.latlng.lng, null, map.getZoom()); });
  marker.on('dragend', function(){ var p = marker.getLatLng(); setLocation(p.lat, p.lng, null, map.getZoom()); });

  // Honor incoming ?address= or ?lat=&lon= so the explorer itself is deep-linkable
  var params = new URLSearchParams(window.location.search);
  var plat = parseFloat(params.get('lat')), plon = parseFloat(params.get('lon')), paddr = params.get('address');
  if (!isNaN(plat) && !isNaN(plon)) { addressInput.value = paddr || ''; setLocation(plat, plon, paddr, 16); }
  else if (paddr) { addressInput.value = paddr; geocode(paddr); }
  else { loadSim(DEFAULT[0], DEFAULT[1], 'Palo Alto, CA'); }
})();
</script>
</body>
</html>
